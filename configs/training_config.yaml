# ==============================
# Qwen Fine-Tuning Configuration
# ==============================

# --- Model ---
model:
  name: "Qwen/Qwen2.5-7B-Instruct"
  torch_dtype: "bfloat16"
  attn_implementation: "sdpa"  # "flash_attention_2" for Linux, "sdpa" for Windows

# --- LoRA / QLoRA ---
lora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  task_type: "CAUSAL_LM"

# --- Quantization (QLoRA) ---
quantization:
  enabled: true
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

# --- Dataset ---
dataset:
  path: "data/train.jsonl"
  val_path: "data/val.jsonl"
  max_seq_length: 2048
  chat_template: "qwen"

# --- Training ---
training:
  output_dir: "outputs/checkpoints"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  save_total_limit: 3
  fp16: false
  bf16: true
  gradient_checkpointing: true
  optim: "paged_adamw_8bit"
  max_grad_norm: 0.3
  report_to: "tensorboard"
  seed: 42
